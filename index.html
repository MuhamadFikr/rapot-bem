<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Persuratan BEM Fahutan IPB</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        select option { color: black; background: white; }
        /* Animasi transisi smooth */
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#0a1128] text-white overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;
        
        // --- KONFIGURASI ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxxmMf9yjoNuzbypcGQMp2Q_XSpgzcWfuEG_hHvne_fIWg-Oy9iXEMtcsqqOSq1cmGv/exec"; 
        const LOGO_URL = "https://i.ibb.co.com/PGDMfSbq/logo.png";

        // Komponen GlassCard tetap di luar untuk stabilitas
        const GlassCard = ({ children, className = "" }) => (
            <div className={`glass rounded-2xl p-6 shadow-xl relative z-10 ${className}`}>
                {children}
            </div>
        );

        // Komponen InputField dengan integrasi Lucide Icons
        const InputField = ({ label, showToggle, toggleAction, isPasswordVisible, ...props }) => (
            <div className="mb-4 relative">
                <label className="block text-sm font-bold text-blue-100 mb-1.5">{label}</label>
                <div className="relative">
                    <input 
                        {...props} 
                        className={`w-full bg-white/5 border rounded-xl px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-white/20 transition-all ${props.disabled ? 'border-white/10 opacity-50 cursor-not-allowed' : 'border-white/20 group-hover:border-white/40'}`}
                    />
                    {showToggle && (
                        <button 
                            type="button" 
                            onClick={toggleAction}
                            className="absolute right-3 top-1/2 -translate-y-1/2 text-white/40 hover:text-white transition-colors p-1 mt-3"
                        >
                            <i data-lucide={isPasswordVisible ? "eye-off" : "eye"} style={{ width: 18, height: 18 }}></i>
                        </button>
                    )}
                </div>
            </div>
        );

        const SelectField = ({ label, options, ...props }) => (
            <div className="mb-4">
                <label className="block text-sm font-bold text-blue-100 mb-1.5">{label}</label>
                <div className="relative">
                    <select 
                        {...props} 
                        className={`w-full bg-white/10 border rounded-xl px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer appearance-none ${props.disabled ? 'border-white/10 opacity-50 cursor-not-allowed' : 'border-white/20'}`}
                    >
                        <option value="">Pilih Opsi</option>
                        {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                    </select>
                    <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none opacity-40">
                        <i data-lucide="chevron-down" style={{width: 14}}></i>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [loading, setLoading] = useState(false);
            const [dataArsip, setDataArsip] = useState([]);
            const [dataCOPM, setDataCOPM] = useState([]);
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [showPassword, setShowPassword] = useState(false);
            const [error, setError] = useState('');
            const [submitting, setSubmitting] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [showDeleteModal, setShowDeleteModal] = useState(null);

            const [formArsip, setFormArsip] = useState({
                tglTerima: '', noSurat: '', tglSurat: '', asal: '', perihal: '', diteruskan: '', kode: '', file: null
            });

            const [formCOPM, setFormCOPM] = useState({
                noSurat: '', judul: '', linkDocs: '', owner: '', tglIsi: '', deadline: '', status: 'Draft', notes: '', linkPdf: ''
            });

            const DEPARTEMEN_LIST = ["BEM Fahutan", "Ketua BEM", "Sekretaris", "Bendahara", "Koordinator Bidang", "Badan Manajemen Internal", "Biro Research and Development", "Biro Media and Digital Information", "Departemen Advokasi dan Kesejahteraan Mahasiswa", "Departemen Konektivitas Eksternal", "Departemen Ekonomi Kreatif", "Departemen Human Resource and Development", "Departemen Akademik dan Prestasi", "Departemen Seni dan Budaya", "Departemen Olahraga", "Departemen Sosial Lingkungan dan Kehutanan", "Departemen Kajian dan Aksi Strategis"];
            const KODE_ARSIP = ["INT", "ORM", "UKM", "BEM", "DTM", "FAK", "IPB", "EKS", "MIT", "MED"];
            const OWNER_LIST = ["BPH", "MI", "RND", "MENDIGI", "KESTARI", "FINANCE", "KORBID", "KONEK", "ADKESMAH", "EKRAF", "AKPRES", "SENBUD", "HRD", "DEPOR", "SLH", "KASTRAT", "[MP] FORCUP", "[MP] BCR", "[MP] SEMARAK", "[MP] FACT", "[MP] RIMBADES", "Faculty Day"];
            const STATUS_LIST = ["Draft", "Final", "Revisi"];

            useEffect(() => { 
                lucide.createIcons(); 
            });

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            action: 'login', 
                            payload: loginForm
                        })
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        setUser(result.user);
                    } else {
                        setError(result.message || 'Username atau Password salah!');
                    }
                } catch (err) { 
                    setError('Koneksi database gagal. Periksa Script URL.'); 
                }
                setLoading(false);
            };

            const fetchData = useCallback(async () => {
                if (!user) return;
                setLoading(true);
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=readAll`);
                    const result = await response.json();
                    setDataArsip(result.arsip || []);
                    setDataCOPM(result.copm || []);
                } catch (err) { console.error(err); }
                setLoading(false);
            }, [user]);

            useEffect(() => { if (user) fetchData(); }, [user, fetchData]);

            const handleSubmitArsip = async (e) => {
                e.preventDefault();
                setSubmitting(true);
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'submitArsip', payload: formArsip })
                    });
                    const res = await response.json();
                    if(res.status === 'success') {
                        alert("Surat berhasil diarsipkan!");
                        setFormArsip({ tglTerima: '', noSurat: '', tglSurat: '', asal: '', perihal: '', diteruskan: '', kode: '', file: null });
                        fetchData();
                        setView('data-arsip');
                    }
                } catch (err) { alert("Terjadi kesalahan pengiriman."); }
                setSubmitting(false);
            };

            const handleSubmitCOPM = async (e) => {
                e.preventDefault();
                setSubmitting(true);
                try {
                    const payload = { ...formCOPM, notes: formCOPM.notes || "" };
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'submitCOPM', payload })
                    });
                    const res = await response.json();
                    if(res.status === 'success') {
                        alert("Data COPM Berhasil Diperbarui!");
                        setFormCOPM({ noSurat: '', judul: '', linkDocs: '', owner: '', tglIsi: '', deadline: '', status: 'Draft', notes: '', linkPdf: '' });
                        fetchData();
                        setView('cek-status');
                    }
                } catch (err) { alert("Gagal memperbarui data."); }
                setSubmitting(false);
            };

            const handleDeleteArsip = async (noSurat) => {
                setLoading(true);
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'deleteArsip', payload: { noSurat } })
                    });
                    const res = await response.json();
                    if(res.status === 'success') fetchData();
                } catch (err) { console.error(err); }
                setShowDeleteModal(null);
                setLoading(false);
            };

            // FUNGSI EDIT YANG SEBELUMNYA HILANG
            const handleEditCOPM = (item) => {
                setFormCOPM(item);
                setView('ajukan');
            };

            const filteredArsip = dataArsip.filter(item => 
                Object.values(item).some(val => String(val).toLowerCase().includes(searchQuery.toLowerCase()))
            );

            if (!user) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 relative bg-[#0a0e27]">
                        <div className="absolute w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-[120px] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
                        <GlassCard className="w-full max-w-md border-t-4 border-t-[#193DEB] fade-in">
                            <div className="text-center mb-8">
                                <img src={LOGO_URL} alt="Logo" className="h-24 mx-auto mb-4 drop-shadow-lg" />
                                <h1 className="text-xl font-extrabold uppercase tracking-widest text-white">Sistem Persuratan</h1>
                                <p className="text-blue-300 text-[10px] mt-1 font-bold uppercase tracking-wider">BEM Fahutan Elaborasi Mimpi</p>
                            </div>
                            <form onSubmit={handleLogin}>
                                <InputField 
                                    label="Username" 
                                    type="text" 
                                    value={loginForm.username} 
                                    onChange={e => setLoginForm(p => ({...p, username: e.target.value}))} 
                                    required 
                                    placeholder="Username"
                                />
                                <InputField 
                                    label="Password" 
                                    type={showPassword ? "text" : "password"} 
                                    value={loginForm.password} 
                                    onChange={e => setLoginForm(p => ({...p, password: e.target.value}))} 
                                    required 
                                    placeholder="Password"
                                    showToggle={true}
                                    isPasswordVisible={showPassword}
                                    toggleAction={() => setShowPassword(!showPassword)}
                                />
                                {error && (
                                    <div className="text-red-400 text-[10px] mb-4 flex items-center gap-2 bg-red-400/10 p-2 rounded-lg border border-red-400/20">
                                        <i data-lucide="alert-circle" style={{width: 14}}></i> {error}
                                    </div>
                                )}
                                <button disabled={loading} className="w-full py-4 bg-[#193DEB] hover:bg-blue-600 text-white font-black rounded-xl shadow-lg transition-all active:scale-95 flex justify-center items-center gap-2">
                                    {loading ? <i data-lucide="loader" className="animate-spin"></i> : <i data-lucide="log-in"></i>}
                                    {loading ? "MEMUAT..." : "MASUK KE SISTEM"}
                                </button>
                            </form>
                        </GlassCard>
                        <div className="mt-8 text-white/20 text-[10px] font-bold uppercase tracking-[0.3em]">&copy; Sekretaris Eksekutif</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#0a1128]">
                    {/* Sidebar */}
                    <div className="w-full md:w-64 bg-black/40 backdrop-blur-xl border-r border-white/10 p-6 flex flex-col shrink-0">
                        <div className="mb-10 flex items-center gap-3">
                            <img src={LOGO_URL} className="h-10" alt="Logo" />
                            <div className="text-xs font-black leading-tight uppercase tracking-tighter">ELABORASI<br/><span className="text-blue-500">MIMPI</span></div>
                        </div>
                        <nav className="flex-1 space-y-2 font-bold text-sm">
                            <button onClick={() => setView('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'dashboard' ? 'bg-[#193DEB] shadow-lg' : 'hover:bg-white/5 text-gray-400'}`}>
                                <i data-lucide="layout-dashboard"></i> Dashboard
                            </button>
                            {user.role === 'admin' && (
                                <>
                                    <div className="pt-6 pb-2 px-4 text-[10px] font-black text-gray-500 uppercase tracking-widest">Pengarsipan</div>
                                    <button onClick={() => setView('arsipkan')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'arsipkan' ? 'bg-[#193DEB] shadow-lg' : 'hover:bg-white/5 text-gray-400'}`}>
                                        <i data-lucide="archive"></i> Arsipkan Surat
                                    </button>
                                    <button onClick={() => setView('data-arsip')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'data-arsip' ? 'bg-[#193DEB] shadow-lg' : 'hover:bg-white/5 text-gray-400'}`}>
                                        <i data-lucide="list"></i> Data Surat
                                    </button>
                                </>
                            )}
                            <div className="pt-6 pb-2 px-4 text-[10px] font-black text-gray-500 uppercase tracking-widest">COPM Surat</div>
                            <button onClick={() => setView('ajukan')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'ajukan' ? 'bg-[#193DEB] shadow-lg' : 'hover:bg-white/5 text-gray-400'}`}>
                                <i data-lucide="plus-circle"></i> Ajukan Surat
                            </button>
                            <button onClick={() => setView('cek-status')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'cek-status' ? 'bg-[#193DEB] shadow-lg' : 'hover:bg-white/5 text-gray-400'}`}>
                                <i data-lucide="shield-check"></i> Cek Status
                            </button>
                        </nav>
                        <div className="mt-auto pt-6 border-t border-white/10 flex items-center gap-3 text-[10px]">
                            <div className="bg-[#193DEB] w-8 h-8 rounded-lg font-black flex items-center justify-center text-white">U</div>
                            <div className="truncate flex-1">
                                <b className="text-white uppercase tracking-wider">{user.nama_lengkap}</b><br/>
                                <span className="opacity-50 font-bold uppercase">{user.biro_departemen}</span>
                            </div>
                            <button onClick={() => setUser(null)} className="text-red-400 hover:bg-red-400/10 p-2 rounded-lg transition-all" title="Logout">
                                <i data-lucide="log-out" style={{width: 16}}></i>
                            </button>
                        </div>
                    </div>

                    {/* Content */}
                    <div className="flex-1 p-6 md:p-10 overflow-y-auto">
                        
                        {view === 'dashboard' && (
                            <div className="fade-in">
                                <h2 className="text-3xl font-black mb-8 italic uppercase tracking-tighter">Dashboard Utama</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <GlassCard className="border-l-4 border-l-blue-500 py-10 flex justify-between items-center group hover:bg-white/5 transition-all">
                                        <div>
                                            <p className="text-[10px] font-black uppercase tracking-widest text-blue-300">Total Arsip Surat</p>
                                            <h3 className="text-6xl font-black">{dataArsip.length}</h3>
                                        </div>
                                        <i data-lucide="archive" className="opacity-10 group-hover:opacity-30 transition-all" style={{width: 80, height: 80}}></i>
                                    </GlassCard>
                                    <GlassCard className="border-l-4 border-l-indigo-500 py-10 flex justify-between items-center group hover:bg-white/5 transition-all">
                                        <div>
                                            <p className="text-[10px] font-black uppercase tracking-widest text-indigo-300">Total COPM Surat</p>
                                            <h3 className="text-6xl font-black">{dataCOPM.length}</h3>
                                        </div>
                                        <i data-lucide="file-text" className="opacity-10 group-hover:opacity-30 transition-all" style={{width: 80, height: 80}}></i>
                                    </GlassCard>
                                </div>
                            </div>
                        )}

                        {view === 'arsipkan' && (
                            <div className="max-w-4xl mx-auto fade-in">
                                <h2 className="text-2xl font-black mb-6 uppercase italic flex items-center gap-3">
                                    <i data-lucide="archive" className="text-blue-500"></i> Arsipkan Surat Baru
                                </h2>
                                <GlassCard>
                                    <form onSubmit={handleSubmitArsip} className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                                        <InputField label="Tanggal Terima" type="date" value={formArsip.tglTerima} onChange={e => setFormArsip(p => ({...p, tglTerima: e.target.value}))} required />
                                        <InputField label="Nomor Surat" type="text" value={formArsip.noSurat} onChange={e => setFormArsip(p => ({...p, noSurat: e.target.value}))} required />
                                        <InputField label="Tanggal Surat" type="date" value={formArsip.tglSurat} onChange={e => setFormArsip(p => ({...p, tglSurat: e.target.value}))} required />
                                        <InputField label="Terima Dari" type="text" value={formArsip.asal} onChange={e => setFormArsip(p => ({...p, asal: e.target.value}))} required />
                                        <div className="md:col-span-2"><InputField label="Perihal" type="text" value={formArsip.perihal} onChange={e => setFormArsip(p => ({...p, perihal: e.target.value}))} required /></div>
                                        <SelectField label="Diteruskan Kepada" options={DEPARTEMEN_LIST} value={formArsip.diteruskan} onChange={e => setFormArsip(p => ({...p, diteruskan: e.target.value}))} required />
                                        <SelectField label="Kode Arsip" options={KODE_ARSIP} value={formArsip.kode} onChange={e => setFormArsip(p => ({...p, kode: e.target.value}))} required />
                                        <div className="md:col-span-2 mb-6">
                                            <div className="border-2 border-dashed border-white/20 p-10 rounded-2xl text-center relative group hover:border-blue-500 transition-all bg-white/5">
                                                <input type="file" accept=".pdf" className="absolute inset-0 opacity-0 cursor-pointer z-10" onChange={e => {
                                                    const f = e.target.files[0];
                                                    if (!f) return;
                                                    const r = new FileReader();
                                                    r.onload = () => setFormArsip(p => ({...p, file: { base64: r.result.split(',')[1], name: f.name, type: f.type }}));
                                                    r.readAsDataURL(f);
                                                }} />
                                                {formArsip.file ? (
                                                    <div className="flex flex-col items-center gap-2">
                                                        <i data-lucide="file-check" className="text-green-400" style={{width: 32, height: 32}}></i>
                                                        <span className="text-green-400 font-bold uppercase text-[10px]">{formArsip.file.name}</span>
                                                    </div>
                                                ) : (
                                                    <div className="opacity-50 font-black flex flex-col items-center gap-2 text-[10px]">
                                                        <i data-lucide="upload-cloud" style={{width: 32, height: 32}}></i>
                                                        <span>KLIK UNTUK UNGGAH BERKAS PDF SURAT</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                        <button disabled={submitting} className="bg-[#193DEB] hover:bg-blue-600 px-8 py-4 rounded-xl font-black shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                                            {submitting ? <i data-lucide="loader" className="animate-spin"></i> : <i data-lucide="save"></i>}
                                            {submitting ? "PROSES..." : "SIMPAN ARSIP"}
                                        </button>
                                    </form>
                                </GlassCard>
                            </div>
                        )}

                        {view === 'data-arsip' && (
                            <div className="fade-in">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                                    <h2 className="text-2xl font-black uppercase italic">Database Surat Masuk</h2>
                                    <div className="relative w-full md:w-80">
                                        <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 opacity-30"></i>
                                        <input className="bg-white/5 border border-white/10 rounded-full pl-12 pr-6 py-3 text-sm w-full outline-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="Cari berdasarkan No/Perihal/Asal..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                    </div>
                                </div>
                                <GlassCard className="p-0 overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-[11px] whitespace-nowrap">
                                            <thead className="bg-white/5 font-black uppercase tracking-widest text-blue-200">
                                                <tr>
                                                    <th className="px-6 py-5 border-r border-white/5">No. Surat</th>
                                                    <th className="px-6 py-4 border-r border-white/5">Asal Pengirim</th>
                                                    <th className="px-6 py-4 border-r border-white/5">Perihal</th>
                                                    <th className="px-6 py-4 text-center">Tindakan</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5">
                                                {filteredArsip.length === 0 ? (
                                                    <tr><td colSpan="4" className="text-center py-20 opacity-30 italic font-bold">Data tidak ditemukan atau masih kosong.</td></tr>
                                                ) : (
                                                    filteredArsip.map((it, i) => (
                                                        <tr key={i} className="hover:bg-white/[0.03] transition-colors">
                                                            <td className="px-6 py-5 font-mono font-black text-blue-400 tracking-tighter">{it.noSurat}</td>
                                                            <td className="px-6 py-4 font-bold">{it.asal}</td>
                                                            <td className="px-6 py-4 truncate max-w-xs">{it.perihal}</td>
                                                            <td className="px-6 py-4 flex justify-center gap-4">
                                                                {it.fileUrl && (
                                                                    <a href={it.fileUrl} target="_blank" className="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-lg font-black hover:bg-blue-500/20 transition-all flex items-center gap-1 uppercase text-[10px]">
                                                                        <i data-lucide="file-text" style={{width: 12}}></i> LIHAT
                                                                    </a>
                                                                )}
                                                                <button onClick={() => setShowDeleteModal(it.noSurat)} className="bg-red-500/10 text-red-400 px-3 py-1 rounded-lg font-black hover:bg-red-500/20 transition-all flex items-center gap-1 uppercase text-[10px]">
                                                                    <i data-lucide="trash-2" style={{width: 12}}></i> HAPUS
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </GlassCard>
                            </div>
                        )}

                        {view === 'ajukan' && (
                            <div className="max-w-4xl mx-auto fade-in">
                                <h2 className="text-2xl font-black mb-6 uppercase italic flex items-center gap-3">
                                    <i data-lucide="file-plus" className="text-indigo-400"></i> {formCOPM.judul ? "Edit / Revisi Pengajuan" : "Ajukan Pembuatan Surat"}
                                </h2>
                                <GlassCard>
                                    <form onSubmit={handleSubmitCOPM} className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                                        <InputField 
                                            label="Nomor Surat" 
                                            type="text" 
                                            value={formCOPM.noSurat} 
                                            onChange={e => setFormCOPM(p => ({...p, noSurat: e.target.value}))} 
                                            disabled={user.role !== 'admin'} 
                                            placeholder={user.role === 'admin' ? "Input Nomor Surat" : "Hanya Admin"}
                                        />
                                        <InputField 
                                            label="Judul Surat" 
                                            type="text" 
                                            value={formCOPM.judul} 
                                            onChange={e => setFormCOPM(p => ({...p, judul: e.target.value}))} 
                                            required 
                                            disabled={user.role === 'admin'} 
                                            placeholder="Nama Kegiatan/Proposal"
                                        />
                                        <InputField 
                                            label="Link Google Docs" 
                                            type="url" 
                                            value={formCOPM.linkDocs} 
                                            onChange={e => setFormCOPM(p => ({...p, linkDocs: e.target.value}))} 
                                            required 
                                            disabled={user.role === 'admin'} 
                                            placeholder="https://docs.google.com/..."
                                        />
                                        <SelectField 
                                            label="Owner Unit" 
                                            options={OWNER_LIST} 
                                            value={formCOPM.owner} 
                                            onChange={e => setFormCOPM(p => ({...p, owner: e.target.value}))} 
                                            required 
                                            disabled={user.role === 'admin'} 
                                        />
                                        <InputField 
                                            label="Tgl Pengisian" 
                                            type="date" 
                                            value={formCOPM.tglIsi} 
                                            onChange={e => setFormCOPM(p => ({...p, tglIsi: e.target.value}))} 
                                            required 
                                            disabled={user.role === 'admin'} 
                                        />
                                        <InputField 
                                            label="Deadline" 
                                            type="date" 
                                            value={formCOPM.deadline} 
                                            onChange={e => setFormCOPM(p => ({...p, deadline: e.target.value}))} 
                                            required 
                                            disabled={user.role === 'admin'} 
                                        />
                                        
                                        {user.role === 'admin' ? (
                                            <>
                                                <SelectField label="Status (Wewenang Admin)" options={STATUS_LIST} value={formCOPM.status} onChange={e => setFormCOPM(p => ({...p, status: e.target.value}))} />
                                                <InputField label="Link PDF Final" type="url" value={formCOPM.linkPdf} onChange={e => setFormCOPM(p => ({...p, linkPdf: e.target.value}))} placeholder="Link Berkas PDF yang sudah ditanda tangan" />
                                            </>
                                        ) : (
                                            <div className="mb-4 bg-blue-500/10 p-4 rounded-xl border border-blue-500/20 text-[11px]">
                                                <p className="font-bold uppercase text-blue-300 mb-1">Status Pengajuan</p>
                                                <div className="flex items-center gap-2">
                                                    <i data-lucide="shield-alert" style={{width: 14}}></i>
                                                    <span className="font-black uppercase tracking-widest">{formCOPM.status}</span>
                                                </div>
                                                <p className="opacity-50 mt-1 italic">Hanya Admin yang dapat merubah Status & mengunggah PDF Final.</p>
                                            </div>
                                        )}
                                        
                                        <div className="md:col-span-2">
                                            <InputField 
                                                label="Catatan / Notes (Opsional)" 
                                                type="text" 
                                                value={formCOPM.notes} 
                                                onChange={e => setFormCOPM(p => ({...p, notes: e.target.value}))} 
                                                disabled={user.role === 'admin'} 
                                                placeholder="Berikan info tambahan jika diperlukan..."
                                            />
                                        </div>
                                        
                                        <button disabled={submitting} className="bg-[#193DEB] hover:bg-blue-600 px-12 py-4 rounded-2xl font-black uppercase shadow-lg shadow-blue-900/20 flex items-center justify-center gap-3 transition-all active:scale-95 w-full md:w-auto">
                                            {submitting ? <i data-lucide="loader" className="animate-spin"></i> : <i data-lucide="check-circle-2"></i>}
                                            {submitting ? "MENGIRIM..." : "SIMPAN PERUBAHAN DATA"}
                                        </button>
                                    </form>
                                </GlassCard>
                            </div>
                        )}

                        {view === 'cek-status' && (
                            <div className="fade-in">
                                <h2 className="text-2xl font-black mb-8 uppercase italic flex items-center gap-3">
                                    <i data-lucide="shield-check" className="text-blue-500"></i> Monitoring Status COPM
                                </h2>
                                <GlassCard className="p-0 overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-[11px] whitespace-nowrap">
                                            <thead className="bg-white/5 font-black uppercase tracking-widest text-indigo-200">
                                                <tr>
                                                    <th className="px-8 py-5 border-r border-white/5">Judul Surat</th>
                                                    <th className="px-8 py-5 border-r border-white/5">Owner</th>
                                                    <th className="px-8 py-5 border-r border-white/5">Status</th>
                                                    <th className="px-8 py-5 text-center">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5">
                                                {dataCOPM.length === 0 ? (
                                                    <tr><td colSpan="4" className="text-center py-20 opacity-30 italic font-bold">Belum ada pengajuan surat saat ini.</td></tr>
                                                ) : (
                                                    dataCOPM.map((it, i) => (
                                                        <tr key={i} className="hover:bg-white/[0.03] transition-colors">
                                                            <td className="px-8 py-5">
                                                                <div className="font-black text-white uppercase">{it.judul}</div>
                                                                <div className="text-[9px] opacity-40 font-mono mt-0.5">{it.noSurat || 'Nomor Belum Terbit'}</div>
                                                            </td>
                                                            <td className="px-8 py-5 font-bold text-gray-400">{it.owner}</td>
                                                            <td className="px-8 py-5">
                                                                <span className={`px-3 py-1 rounded-md font-black tracking-tighter uppercase border ${
                                                                    it.status === 'Final' ? 'bg-green-500/10 text-green-400 border-green-500/20' : 
                                                                    it.status === 'Revisi' ? 'bg-orange-500/10 text-orange-400 border-orange-500/20' : 
                                                                    'bg-blue-500/10 text-blue-400 border-blue-500/20'
                                                                }`}>
                                                                    {it.status || 'Draft'}
                                                                </span>
                                                            </td>
                                                            <td className="px-8 py-5 flex justify-center gap-4">
                                                                <a href={it.linkDocs} target="_blank" className="flex items-center gap-1 bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-lg font-black transition-all text-blue-400 border border-white/5">
                                                                    <i data-lucide="file-text" style={{width: 14}}></i> DOCS
                                                                </a>
                                                                <button onClick={() => handleEditCOPM(it)} className="flex items-center gap-1 bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-lg font-black transition-all text-indigo-400 border border-white/5">
                                                                    <i data-lucide="edit-3" style={{width: 14}}></i> EDIT
                                                                </button>
                                                                {it.linkPdf && (
                                                                    <a href={it.linkPdf} target="_blank" className="flex items-center gap-1 bg-green-500/10 hover:bg-green-500/20 px-3 py-1.5 rounded-lg font-black transition-all text-green-400 border border-green-500/20">
                                                                        <i data-lucide="file-check" style={{width: 14}}></i> PDF
                                                                    </a>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </GlassCard>
                            </div>
                        )}
                    </div>

                    {/* Modal Hapus */}
                    {showDeleteModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 fade-in">
                            <GlassCard className="max-w-sm w-full text-center border-t-4 border-t-red-600 shadow-red-900/20 shadow-2xl">
                                <i data-lucide="alert-triangle" className="mx-auto text-red-600 mb-4" style={{width: 60, height: 60}}></i>
                                <h3 className="text-lg font-black mb-2 uppercase tracking-tight text-white">KONFIRMASI HAPUS</h3>
                                <p className="text-[10px] text-gray-400 mb-6 font-bold">Apakah Anda yakin ingin menghapus data arsip surat nomor:<br/><span className="text-red-400 font-black">{showDeleteModal}</span>?</p>
                                <div className="flex gap-4 px-2">
                                    <button onClick={() => setShowDeleteModal(null)} className="flex-1 py-3 rounded-xl bg-white/5 font-black uppercase text-[10px] border border-white/10 hover:bg-white/10 transition-all">BATAL</button>
                                    <button onClick={() => handleDeleteArsip(showDeleteModal)} className="flex-1 py-3 rounded-xl bg-red-600 font-black uppercase text-[10px] shadow-lg shadow-red-900/40 hover:bg-red-700 transition-all active:scale-95 text-white">HAPUS DATA</button>
                                </div>
                            </GlassCard>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
